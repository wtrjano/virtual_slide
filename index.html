<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>My Virtual Slide</title>
    <script src="https://cdn.jsdelivr.net/npm/openseadragon@4.1/build/openseadragon/openseadragon.min.js"></script>
</head>
<body>
    <div id="openseadragon1" style="width: 100%; height: 95vh; background: #333;"></div>

    <script type="text/javascript">
        var viewer = OpenSeadragon({
            id: "openseadragon1",
            prefixUrl: "https://cdn.jsdelivr.net/npm/openseadragon@4.1/build/openseadragon/images/",
            tileSources: {
                type: 'image',
                url: 'Mfas_Image_20x_BF_01_raw.ome.tiff.tif',
                buildPyramid: false, // OME-TIFF自体がピラミッドなのでfalse
                crossOriginPolicy: 'Anonymous', // CORS対策
                loadTilesWithAjax: false   // Ajaxでの読み込みを強制
            },
            showNavigator: true // 右下にナビゲーターを表示
        });
    </script>
</body>
</html>
